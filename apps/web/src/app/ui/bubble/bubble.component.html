<div class="bubble"
     [ngClass]="['bubble--'+position, 'bubble--'+theme]"
     [class.bubble--visible]="visible"
     [style.width]="width"
     [style.height]="height"
     [style.left]="left + 'px'"
     [style.top]="top + 'px'">
  <span class="bubble-close" (click)="close()">&#x2715;</span>
  {{tip}}
</div>
