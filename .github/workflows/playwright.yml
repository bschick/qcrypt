name: Push and PR Tests
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:

  unittest:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run vitest chrome unit tests
      run: pnpm test

  e2etest:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Qcrypt specific setup
      run: |
        cd apps/web/localssl/
        ./localssl.sh
    - name: Restore keeper credentials
      env:
        E2E_CREDS_B64: ${{ secrets.E2E_CREDS_B64 }}
      run: |
        # Forks and PRs from forks don't receive the secret; the keeper-dependent
        # e2e tests detect the missing file and skip rather than fail.
        if [ -n "$E2E_CREDS_B64" ]; then
          echo "$E2E_CREDS_B64" | base64 -d > apps/web/tests/.creds.json
          echo "Restored keeper credentials."
        else
          echo "No E2E_CREDS_B64 secret available; keeper tests will skip."
        fi
    - name: Run Playwright e2e tests
      # run_e2e.sh owns a frozen dev serve (no watch/live-reload). E2E_SERVE_LOG
      # makes it write the serve log to a known path for the artifact upload.
      env:
        E2E_SERVE_LOG: serve.log
      run: pnpm test:e2e
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-e2e-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: serve-log
        path: serve.log
        retention-days: 30
