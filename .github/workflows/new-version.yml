name: Release Tagged Tests
permissions:
  contents: read
  pull-requests: write
on:
  push:
    tags:
      - 'v*'
jobs:

  unittest:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run vitest chrome & webkit unit tests
      run: pnpm test:web:most
    - name: Run server unit tests
      run: pnpm test:server
    - name: Run library unit tests
      run: pnpm test:libs
    - name: Run cli unit tests
      run: pnpm test:cli

  e2etest:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Restore keeper credentials
      env:
        E2E_CREDS_B64: ${{ secrets.E2E_CREDS_B64 }}
      run: |
        # Without the secret the keeper-dependent e2e tests detect the missing
        # file and skip rather than fail.
        if [ -n "$E2E_CREDS_B64" ]; then
          echo "$E2E_CREDS_B64" | base64 -d > apps/web/tests/.creds.json
          echo "Restored keeper credentials."
        else
          echo "No E2E_CREDS_B64 secret available; keeper tests will skip."
        fi
    - name: Run Playwright e2e prod tests
      run: pnpm test:e2e:prod
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-e2e-report
        path: playwright-report/
        retention-days: 30

  fuzztest:
    timeout-minutes: 240
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright e2e prod tests
      run: pnpm test:fuzz:prod
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-fuzz-report
        path: playwright-report/
        retention-days: 30
